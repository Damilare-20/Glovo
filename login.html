<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glovo - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
      <link rel="shortcut icon" href="faveicon.png">
  </head>
  <body>
    <nav class="bg-white px-10 py-4 shadow sticky inset-0 z-1">
      <img src="glovoimage.png" alt="Glovo" class="w-20" />
    </nav>

    <div class="flex items-center justify-center">
      <div class="bg-white p-10 max-w-lg">
        <h1 class="text-4xl font-bold text-gray-800 text-center">Welcome</h1>
        <p class="font-medium mt-5 mb-6 text-center">
          Continue with one of the following options
        </p>

       <div class="flex gap-3 mb-3">

  
  <div>
    <label class="text-sm font-bold text-gray-500 mb-1 block">Prefix</label>
    <select class="border border-gray-300 rounded-lg px-4 py-3 text-sm outline-none w-28">
      <option>🇪🇸 +34</option>
      <option>🇬🇧 +44</option>
      <option>🇺🇸 +1</option>
      <option>NGN +234</option>
      <option>🇫🇷 +33</option>
      <option>🇮🇹 +39</option>
      <option>🇬🇭 +233</option>
    </select>
  </div>

  
  <div class="flex-1">
    <label class="text-sm font-bold text-gray-500 mb-1 block">Phone number</label>
    <input type="tel" placeholder="Phone number" 
    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm outline-none">
  </div>

</div>

        <p class="font-medium text-sm mt-3 mb-10">
          This site is protected by reCAPTCHA and the Google <span class="text-[#00755E] font-bold" >Privacy Policy</span> and
          <span class="text-[#00755E] font-bold">Terms of Service </span> apply.
        </p>

        <div class="flex gap-3 mb-6">
          <button
            class="flex-1 flex items-center justify-center gap-2 bg-[#B2D3C2] text-white py-3 rounded-full hover:bg-[#A0D6B4] transition duration-300"
          >
            <span>WhatsApp</span>
          </button>
          <button
            class="flex-1 flex items-center justify-center gap-2 bg-[#00755E] text-white font-bold py-3 rounded-full hover:bg-[#004B49] transition duration-300"
          >
            <span>SMS</span>
          </button>
        </div>

        <div class="text-center mb-5">
          <p class="text-gray-400 text-lg">or with</p>
        </div>

        <button
          class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-full py-3 mb-3 hover:bg-gray-50 transition duration-300"
        >
          <i class="fa-brands fa-google text-red-500 text-xl"></i>
          <span class="font-bold text-sm text-gray-700"
            >Continue with Google</span
          >
        </button>

        <button
          class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-full py-3 mb-3 hover:bg-gray-50 transition duration-300"
        >
          <i class="fa-brands fa-facebook text-blue-600 text-xl"></i>
          <span class="font-bold text-sm text-gray-700"
            >Continue with Facebook</span
          >
        </button>

        <button
          class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-full py-3 hover:bg-gray-50 transition duration-300"
        >
          <i class="fa-solid fa-envelope text-black text-xl"></i>
          <span class="font-bold text-sm text-gray-700">Email</span>
        </button>

        <p class="mt-10">
          By creating an account, you automatically accept <br />
          our Terms of service, Privacy Policy and Cookies Policy
        </p>
      </div>
    </div>
  </body>
</html>
